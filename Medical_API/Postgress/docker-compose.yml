# docker-compose.yml
version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: medical_postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: medical_system

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medical_system"]
      interval: 10s
      timeout: 5s
      retries: 5

