# docker-compose.yml  (place this at /Dist_sec_project/ root)
version: '3.9'

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: medical_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: medical_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medical_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Medical API (hospital — appointments, records, users) ────────────────────
  medical-api:
    build:
      context: ./Medical_API
      dockerfile: Dockerfile
    container_name: medical_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_NAME: medical_system
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"

  # ── Secure File System API ───────────────────────────────────────────────────
  file-api:
    build:
      context: ./Secure_System_API
      dockerfile: Dockerfile
    container_name: file_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_NAME: medical_system
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
    ports:
      - "5000:5000"
    volumes:
      - private_uploads:/app/private_uploads

# ── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  private_uploads: