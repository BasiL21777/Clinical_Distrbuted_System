# docker-compose.yml — place at /Dist_sec_project/ root
# Run: docker compose up --build
version: '3.9'

services:

  # ── PostgreSQL (one shared instance for all services) ─────────────────────
  postgres:
    image: postgres:16
    container_name: medical_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: medical_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Auth_API/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d medical_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    container_name: medical_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  # ── Auth Service (FastAPI) — owns users table ─────────────────────────────
  auth-service:
    build:
      context: ./Auth_API/auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/medical_system
      SERVICE_NAME: auth-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    ports:
      - "8001:8001"

  # ── Medical API (Node.js) — reads users, owns appointments + records ───────
  medical-api:
    build:
      context: ./Medical_API
      dockerfile: Dockerfile
    container_name: medical_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      PORT: 3000
      DB_NAME: medical_system
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"

  # ── File API (Node.js) — owns medical_files table ─────────────────────────
  file-api:
    build:
      context: ./Secure_System_API
      dockerfile: Dockerfile
    container_name: file_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    environment:
      PORT: 5000
      DB_NAME: medical_system
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
    ports:
      - "5000:5000"
    volumes:
      - private_uploads:/app/private_uploads

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  rabbitmq_data:
  private_uploads: